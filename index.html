<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记忆翻牌游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>🎴 记忆翻牌游戏</h1>

        <div class="difficulty-selector">
            <span class="selector-label">选择难度：</span>
            <div class="difficulty-buttons">
                <button class="diff-btn active" data-diff="easy">
                    <span class="diff-icon">🟢</span>
                    <span class="diff-text">简单</span>
                    <span class="diff-desc">3×4 · 6对</span>
                </button>
                <button class="diff-btn" data-diff="normal">
                    <span class="diff-icon">🟡</span>
                    <span class="diff-text">普通</span>
                    <span class="diff-desc">4×4 · 8对</span>
                </button>
                <button class="diff-btn" data-diff="hard">
                    <span class="diff-icon">🔴</span>
                    <span class="diff-text">困难</span>
                    <span class="diff-desc">5×4 · 10对</span>
                </button>
            </div>
        </div>

        <div class="stats">
            <div class="stat-item">
                <span class="stat-icon">⏱️</span>
                <div class="stat-content">
                    <span class="stat-label">用时</span>
                    <span id="timer" class="stat-value">00:00</span>
                </div>
            </div>
            <div class="stat-item">
                <span class="stat-icon">🔄</span>
                <div class="stat-content">
                    <span class="stat-label">翻牌次数</span>
                    <span id="flip-count" class="stat-value">0</span>
                </div>
            </div>
            <div class="stat-item">
                <span class="stat-icon">✅</span>
                <div class="stat-content">
                    <span class="stat-label">已匹配</span>
                    <span id="match-count" class="stat-value">0 / 8</span>
                </div>
            </div>
            <div class="stat-item best-record">
                <span class="stat-icon">🏆</span>
                <div class="stat-content">
                    <span class="stat-label">最佳</span>
                    <span id="best-record" class="stat-value">-</span>
                </div>
            </div>
        </div>

        <div id="game-board" class="game-board"></div>

        <button id="reset-btn" class="reset-btn">🔄 重新开始</button>

        <div class="history-section">
            <div class="history-header">
                <span class="history-title">📜 操作历史</span>
                <button id="clear-history-btn" class="clear-history-btn">清空</button>
            </div>
            <div id="history-list" class="history-list">
                <div class="history-empty">暂无翻牌记录</div>
            </div>
        </div>
    </div>

    <div id="win-modal" class="modal">
        <div class="modal-content">
            <div class="confetti"></div>
            <div class="trophy">🏆</div>
            <h2>恭喜通关！</h2>
            <div id="stars" class="stars">
                <span class="star">⭐</span>
                <span class="star">⭐</span>
                <span class="star">⭐</span>
            </div>
            <div class="result-stats">
                <div class="result-item">
                    <span class="result-label">难度</span>
                    <span id="result-difficulty" class="result-value">-</span>
                </div>
                <div class="result-item">
                    <span class="result-label">用时</span>
                    <span id="result-time" class="result-value">-</span>
                </div>
                <div class="result-item">
                    <span class="result-label">翻牌</span>
                    <span id="result-flips" class="result-value">-</span>
                </div>
            </div>
            <div id="new-record" class="new-record">🎊 新纪录！</div>
            <div class="modal-buttons">
                <button id="play-again-btn" class="modal-btn primary">再玩一次</button>
                <button id="change-diff-btn" class="modal-btn secondary">换个难度</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
